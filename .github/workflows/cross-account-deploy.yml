name: Cross-Account Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - uat
          - prd
        default: dev
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"
      domain_name:
        description: "Website hostname (e.g., dev.example.com)"
        required: true
      certificate_domain:
        description: "ACM certificate domain"
        required: true

env:
  AWS_REGION: ${{ github.event.inputs.aws_region }}
  TF_ENV: ${{ github.event.inputs.environment }}
  SOURCE_ACCOUNT: "226563001214"
  TARGET_ACCOUNT: "713678752742"
  ROLE_NAME: "OrganizationAccountAccessRole"

jobs:
  # Phase 1: Create IAM Role in target account
  create-iam-role:
    name: "Create Cross-Account IAM Role"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'prd' && 'production' || github.event.inputs.environment }}
    
    permissions:
      contents: read
      id-token: write

    outputs:
      role-arn: ${{ steps.role-output.outputs.role-arn }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (source account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify source account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Current account: $ACCOUNT_ID"
          if [ "$ACCOUNT_ID" != "${{ env.TARGET_ACCOUNT }}" ]; then
            echo "Warning: Not in target account. This step creates the role in the current account."
          fi

      - name: Setup Terraform state bucket
        id: state-bucket
        run: |
          BUCKET="cloud-it-control-tf-state-${{ env.TF_ENV }}-${{ env.TARGET_ACCOUNT }}"
          
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating Terraform state bucket: $BUCKET"
            if [ "${{ env.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "${{ env.AWS_REGION }}"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --region "${{ env.AWS_REGION }}" \
                --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
            fi
            
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
              
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi
          
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Terraform Init (IAM Role only)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.state-bucket.outputs.bucket }}" \
            -backend-config="key=${{ env.TF_ENV }}/iam-role.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan (IAM Role only)
        working-directory: terraform
        run: |
          terraform plan \
            -var="environment=${{ env.TF_ENV }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -target=aws_iam_role.organization_access_role \
            -target=aws_iam_role_policy_attachment.admin_access \
            -out="iam-role-plan"

      - name: Terraform Apply (IAM Role only)
        if: github.event.inputs.action != 'plan'
        working-directory: terraform
        run: |
          terraform apply -auto-approve "iam-role-plan"

      - name: Get Role ARN
        if: github.event.inputs.action != 'plan'
        id: role-output
        working-directory: terraform
        run: |
          ROLE_ARN=$(terraform output -raw organization_access_role_arn 2>/dev/null || echo "arn:aws:iam::${{ env.TARGET_ACCOUNT }}:role/${{ env.ROLE_NAME }}")
          echo "role-arn=$ROLE_ARN" >> $GITHUB_OUTPUT
          echo "Created IAM Role: $ROLE_ARN"

  # Phase 2: Deploy infrastructure using the created role
  deploy-infrastructure:
    name: "Deploy Infrastructure via Cross-Account Role"
    runs-on: ubuntu-latest
    needs: create-iam-role
    if: github.event.inputs.action != 'plan'
    environment: ${{ github.event.inputs.environment == 'prd' && 'production' || github.event.inputs.environment }}
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials and assume cross-account role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ needs.create-iam-role.outputs.role-arn }}
          role-session-name: github-actions-terraform-${{ env.TF_ENV }}-${{ github.run_number }}

      - name: Verify target account access
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Successfully assumed role in account: $ACCOUNT_ID"
          if [ "$ACCOUNT_ID" != "${{ env.TARGET_ACCOUNT }}" ]; then
            echo "::error::Expected account ${{ env.TARGET_ACCOUNT }}, got $ACCOUNT_ID"
            exit 1
          fi

      - name: Setup Terraform state bucket (target account)
        id: state-bucket
        run: |
          BUCKET="cloud-it-control-tf-state-${{ env.TF_ENV }}-${{ env.TARGET_ACCOUNT }}"
          
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating Terraform state bucket: $BUCKET"
            if [ "${{ env.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "${{ env.AWS_REGION }}"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --region "${{ env.AWS_REGION }}" \
                --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
            fi
            
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
              
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi
          
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Terraform Init (Full Infrastructure)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.state-bucket.outputs.bucket }}" \
            -backend-config="key=${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan (Full Infrastructure)
        working-directory: terraform
        run: |
          terraform plan \
            -var="environment=${{ env.TF_ENV }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="domain_name=${{ github.event.inputs.domain_name }}" \
            -var="certificate_domain=${{ github.event.inputs.certificate_domain }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="supabase_project_id=${{ secrets.VITE_SUPABASE_PROJECT_ID }}" \
            -var="supabase_url=${{ secrets.VITE_SUPABASE_URL }}" \
            -var="supabase_publishable_key=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -out="tfplan-${{ env.TF_ENV }}" \
            -no-color

      - name: Terraform Apply (Full Infrastructure)
        if: github.event.inputs.action == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve "tfplan-${{ env.TF_ENV }}"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: terraform
        run: |
          terraform destroy \
            -var="environment=${{ env.TF_ENV }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="domain_name=${{ github.event.inputs.domain_name }}" \
            -var="certificate_domain=${{ github.event.inputs.certificate_domain }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="supabase_project_id=${{ secrets.VITE_SUPABASE_PROJECT_ID }}" \
            -var="supabase_url=${{ secrets.VITE_SUPABASE_URL }}" \
            -var="supabase_publishable_key=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -auto-approve

      - name: Terraform Outputs
        if: github.event.inputs.action == 'apply'
        working-directory: terraform
        run: terraform output

  # Phase 3: Deploy application (if infrastructure was applied)
  deploy-application:
    name: "Deploy Application"
    runs-on: ubuntu-latest
    needs: [create-iam-role, deploy-infrastructure]
    if: github.event.inputs.action == 'apply'
    environment: ${{ github.event.inputs.environment == 'prd' && 'production' || github.event.inputs.environment }}
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials and assume cross-account role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ needs.create-iam-role.outputs.role-arn }}
          role-session-name: github-actions-deploy-${{ env.TF_ENV }}-${{ github.run_number }}

      - name: Setup Terraform (for outputs)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=cloud-it-control-tf-state-${{ env.TF_ENV }}-${{ env.TARGET_ACCOUNT }}" \
            -backend-config="key=${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
          
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
          WEBSITE_URL=$(terraform output -raw website_url)
          
          echo "s3-bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          echo "website-url=$WEBSITE_URL" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ "s3://${{ steps.tf-outputs.outputs.s3-bucket }}/" \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude ".git*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-outputs.outputs.cloudfront-id }}" \
            --paths "/*"

      - name: Deployment Summary
        run: |
          echo "🚀 Deployment Complete!"
          echo "Website URL: ${{ steps.tf-outputs.outputs.website-url }}"
          echo "Environment: ${{ env.TF_ENV }}"
          echo "AWS Account: ${{ env.TARGET_ACCOUNT }}"
          echo "Region: ${{ env.AWS_REGION }}"